<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>

    <linearGradient id="beamGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="45%" stop-color="#7C3AED" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="1"/>
      <stop offset="55%" stop-color="#7C3AED" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="220" fill="#000000"/>
  <rect width="1200" height="220" fill="url(#grid)"/>

  <rect x="-400" y="0" width="400" height="220" fill="url(#beamGradient)" filter="url(#softBlur)">
    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 0"
      to="2000 0"
      dur="6s"
      repeatCount="indefinite"/>
  </rect>

  <rect x="-400" y="0" width="400" height="220" fill="url(#beamGradient)" opacity="0.9">
    <animateTransform
      attributeName="transform"
      type="translate"
      from="0 0"
      to="2000 0"
      dur="6s"
      repeatCount="indefinite"/>
  </rect>

  <circle cx="600" cy="110" r="180" fill="url(#glow)">
    <animate attributeName="r" values="160;190;160" dur="4s" repeatCount="indefinite"/>
  </circle>

  <text x="600" y="100" text-anchor="middle" font-family="Fira Code, monospace" font-size="42" font-weight="700" fill="#ffffff">
    Hi, I'm Lisa
  </text>
  <text x="600" y="140" text-anchor="middle" font-family="Fira Code, monospace" font-size="18" fill="#a1a1aa">
    Full-Stack Developer &#8226; Systems &#38; Web
  </text>
</svg>
