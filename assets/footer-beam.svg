<svg width="1200" height="90" viewBox="0 0 1200 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="gridFooter" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161616" stroke-width="1"/>
    </pattern>

    <linearGradient id="arcGradFooter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <filter id="arcBlurFooter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="1200" height="90" fill="#000000"/>
  <rect width="1200" height="90" fill="url(#gridFooter)"/>

  <path d="M 20 90 Q 600 -30 1180 90" fill="none" stroke="url(#arcGradFooter)" stroke-width="3" filter="url(#arcBlurFooter)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.85;0.85;0" keyTimes="0;0.15;0.45;0.65;1" dur="6s" repeatCount="indefinite"/>
  </path>

  <path d="M 220 90 Q 600 10 980 90" fill="none" stroke="#ffffff" stroke-width="1" filter="url(#arcBlurFooter)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.5;0.5;0" keyTimes="0;0.2;0.5;0.55;1" dur="6s" repeatCount="indefinite" begin="2s"/>
  </path>
</svg>
